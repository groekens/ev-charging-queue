<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EV Charging Queue Management">
    <meta name="theme-color" content="#10b981">
    <title>EV Charging Queue ⚡</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .notification-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f3f4f6;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .notification-status.enabled {
            background: #d1fae5;
            color: #065f46;
        }

        .notification-status.disabled {
            background: #fee2e2;
            color: #991b1b;
        }

        .trigram-input-section {
            margin-bottom: 24px;
        }

        .trigram-input-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .trigram-input-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }

        .trigram-input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .trigram-display {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .site-section {
            margin-bottom: 24px;
        }

        .site-section h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .station-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .station-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-dot.busy {
            background: #ef4444;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #667eea;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .queue-section {
            margin-top: 24px;
        }

        .queue-section h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #6b7280;
        }

        .queue-list {
            list-style: none;
        }

        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }

        .queue-item.my-turn {
            background: #d1fae5;
            border-left-color: #10b981;
        }

        .queue-position {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .position-number {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .queue-trigram {
            font-weight: 600;
            font-size: 16px;
            color: #1f2937;
        }

        .queue-site {
            font-size: 12px;
            color: #6b7280;
            margin-left: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .site-preference {
            margin-top: 16px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .site-preference label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .radio-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 24px;
            }

            .card {
                padding: 16px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>⚡</span>
                <span>EV Charging Queue</span>
            </h1>
            <p>Queue management for LLN 1 & LLN 2</p>
        </div>

        <div id="app">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBJCAcq4eKCgJQZ9iOq3mlxjGxxHEjchOk",
            authDomain: "ev-charging-queue.firebaseapp.com",
            projectId: "ev-charging-queue",
            storageBucket: "ev-charging-queue.firebasestorage.app",
            messagingSenderId: "260636724772",
            appId: "1:260636724772:web:2d05d51d46f3cdd55a92b1"
        };

        const VAPID_KEY = "BLkB9s36CqTztC4c4OIf0ijO_hPHQm-4bKacmamRtb-ryIH0PLJL5xz08AKqbyvvNc9nZUNHpE6n4--xPMZM4fk";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        const STORAGE_KEY = 'ev-charging-state';
        const MAX_SPOTS = {
            'LLN1': 6,
            'LLN2': 4
        };

        class EVChargingApp {
            constructor() {
                this.state = {
                    userTrigram: localStorage.getItem('userTrigram') || '',
                    sites: {
                        'LLN1': { charging: [] },
                        'LLN2': { charging: [] }
                    },
                    globalQueue: [],
                    lastReset: null
                };
                this.notificationsEnabled = false;
                this.fcmToken = null;
                this.messaging = messaging;
                this.init();
            }

            async init() {
                await this.loadState();
                this.checkDailyReset();
                this.render();
                
                // Listen for foreground messages
                onMessage(this.messaging, (payload) => {
                    console.log('Message received:', payload);
                    const notificationTitle = payload.notification.title;
                    const notificationOptions = {
                        body: payload.notification.body,
                        icon: '/icon-192.png'
                    };
                    
                    if (Notification.permission === 'granted') {
                        new Notification(notificationTitle, notificationOptions);
                    }
                });
                
                // Refresh state every 10 seconds
                setInterval(() => {
                    this.loadState();
                    this.render();
                }, 10000);
            }

            async loadState() {
                try {
                    const result = await window.storage.get(STORAGE_KEY, true);
                    if (result && result.value) {
                        const savedState = JSON.parse(result.value);
                        this.state.sites = savedState.sites || this.state.sites;
                        this.state.globalQueue = savedState.globalQueue || [];
                        this.state.lastReset = savedState.lastReset;
                    }
                } catch (error) {
                    console.log('No saved state found, using default');
                }
            }

            async saveState() {
                try {
                    const stateToSave = {
                        sites: this.state.sites,
                        globalQueue: this.state.globalQueue,
                        lastReset: this.state.lastReset,
                        fcmTokens: await this.getStoredTokens()
                    };
                    await window.storage.set(STORAGE_KEY, JSON.stringify(stateToSave), true);
                    return true;
                } catch (error) {
                    console.error('Error saving state:', error);
                    return false;
                }
            }

            async getStoredTokens() {
                try {
                    const result = await window.storage.get('fcm-tokens', true);
                    return result ? JSON.parse(result.value) : {};
                } catch {
                    return {};
                }
            }

            async saveToken(trigram, token) {
                // Sauvegarder localement
                const tokens = await this.getStoredTokens();
                tokens[trigram] = token;
                await window.storage.set('fcm-tokens', JSON.stringify(tokens), true);
                
                // Sauvegarder via Cloud Function
                try {
                    const response = await fetch('https://savetoken-lhbed5jb2q-uc.a.run.app', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ trigram, token })
                    });
                    
                    if (!response.ok) {
                        console.error('Error saving token to Firestore');
                    }
                } catch (error) {
                    console.error('Error calling saveToken function:', error);
                }
            }

            checkDailyReset() {
                const now = new Date();
                const today = now.toDateString();
                
                if (!this.state.lastReset || this.state.lastReset !== today) {
                    if (!this.state.lastReset || now.getHours() >= 0) {
                        this.resetDaily();
                    }
                }
            }

            async resetDaily() {
                this.state.sites = {
                    'LLN1': { charging: [] },
                    'LLN2': { charging: [] }
                };
                this.state.globalQueue = [];
                this.state.lastReset = new Date().toDateString();
                await this.saveState();
            }

            async enableNotifications() {
                if (!this.state.userTrigram) {
                    alert('Please enter your trigram first');
                    return;
                }

                try {
                    const permission = await Notification.requestPermission();
                    
                    if (permission !== 'granted') {
                        alert('Notification permission denied');
                        return;
                    }

                    const token = await getToken(this.messaging, { vapidKey: VAPID_KEY });
                    
                    if (token) {
                        this.fcmToken = token;
                        await this.saveToken(this.state.userTrigram, token);
                        this.notificationsEnabled = true;
                        localStorage.setItem('notificationsEnabled', 'true');
                        alert('✅ Notifications enabled! You will be notified when it\'s your turn.');
                        this.render();
                    }
                } catch (error) {
                    console.error('Error enabling notifications:', error);
                    alert('Failed to enable notifications. Please try again.');
                }
            }

            async disableNotifications() {
                this.notificationsEnabled = false;
                localStorage.removeItem('notificationsEnabled');
                alert('Notifications disabled');
                this.render();
            }

            setUserTrigram(trigram) {
                this.state.userTrigram = trigram.toUpperCase().trim();
                if (!this.state.userTrigram) {
                    alert('Please enter a valid trigram');
                    return;
                }
                localStorage.setItem('userTrigram', this.state.userTrigram);
                this.render();
            }

            async startCharging(site) {
                if (!this.state.userTrigram) {
                    alert('Please enter your trigram');
                    return;
                }

                const siteData = this.state.sites[site];
                
                const alreadyCharging = Object.values(this.state.sites).some(s => 
                    s.charging.includes(this.state.userTrigram)
                );
                
                if (alreadyCharging) {
                    alert('You are already charging at another site');
                    return;
                }

                if (siteData.charging.length >= MAX_SPOTS[site]) {
                    alert('No charging spot available. Use "Join Queue" to wait.');
                    return;
                }

                siteData.charging.push(this.state.userTrigram);
                this.state.globalQueue = this.state.globalQueue.filter(item => item.trigram !== this.state.userTrigram);
                
                await this.saveState();
                await this.loadState();
                this.render();
            }

            async finishCharging(site) {
                const siteData = this.state.sites[site];
                siteData.charging = siteData.charging.filter(t => t !== this.state.userTrigram);
                
                const nextPerson = this.state.globalQueue.find(item => 
                    item.preference === 'both' || item.preference === site
                );
                
                if (nextPerson) {
                    await this.sendNotification(nextPerson.trigram, 'Your turn! 🔌', `A charging spot is now available at ${site}`);
                }
                
                await this.saveState();
                await this.loadState();
                this.render();
            }

            async sendNotification(trigram, title, body) {
                try {
                    const response = await fetch('https://sendnotification-lhbed5jb2q-uc.a.run.app', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ trigram, title, body })
                    });
                    
                    const result = await response.json();
                    console.log('Notification sent:', result);
                } catch (error) {
                    console.error('Error sending notification:', error);
                }
            }

            async reportSpotFree(site) {
                if (confirm(`Confirm: Is there really a free spot at ${site}?`)) {
                    const nextPerson = this.state.globalQueue.find(item => 
                        item.preference === 'both' || item.preference === site
                    );
                    
                    if (nextPerson) {
                        await this.sendNotification(nextPerson.trigram, 'Spot reported free! 🔌', `Someone reported a free spot at ${site}`);
                        alert(`${nextPerson.trigram} has been notified`);
                    } else {
                        alert(`No one is waiting for ${site} at the moment.`);
                    }
                    
                    this.render();
                }
            }

            async reportNoSpot() {
                if (confirm('Confirm: Was your spot not available when you arrived?')) {
                    alert('You have kept your place in the queue. Sorry for the inconvenience!');
                    this.render();
                }
            }

            async joinQueue(preference = 'both') {
                if (!this.state.userTrigram) {
                    alert('Please enter your trigram');
                    return;
                }

                const alreadyInQueue = this.state.globalQueue.some(item => 
                    item.trigram === this.state.userTrigram
                );
                
                if (alreadyInQueue) {
                    alert('You are already in the queue');
                    return;
                }

                if (preference === 'both') {
                    const lln1Available = MAX_SPOTS['LLN1'] - this.state.sites['LLN1'].charging.length;
                    const lln2Available = MAX_SPOTS['LLN2'] - this.state.sites['LLN2'].charging.length;
                    
                    if (lln1Available > 0 || lln2Available > 0) {
                        const availableSites = [];
                        if (lln1Available > 0) availableSites.push('LLN1');
                        if (lln2Available > 0) availableSites.push('LLN2');
                        
                        alert(`⚠️ There are spots available at ${availableSites.join(' and ')}! Please use "I'm plugging in" instead of joining the queue.`);
                        return;
                    }
                } else {
                    const available = MAX_SPOTS[preference] - this.state.sites[preference].charging.length;
                    if (available > 0) {
                        alert(`⚠️ There are ${available} spot(s) available at ${preference}! Please use "I'm plugging in" instead of joining the queue.`);
                        return;
                    }
                }

                const timestamp = Date.now();
                this.state.globalQueue.push({ 
                    trigram: this.state.userTrigram, 
                    timestamp, 
                    preference 
                });
                
                await this.saveState();
                await this.loadState();
                this.render();
            }

            async leaveQueue() {
                this.state.globalQueue = this.state.globalQueue.filter(item => 
                    item.trigram !== this.state.userTrigram
                );
                
                await this.saveState();
                await this.loadState();
                this.render();
            }

            getUserStatus() {
                for (const [site, data] of Object.entries(this.state.sites)) {
                    if (data.charging.includes(this.state.userTrigram)) {
                        return { status: 'charging', site };
                    }
                }

                const queueItem = this.state.globalQueue.find(item => item.trigram === this.state.userTrigram);
                if (queueItem) {
                    return { 
                        status: 'queued', 
                        position: this.state.globalQueue.indexOf(queueItem) + 1, 
                        preference: queueItem.preference 
                    };
                }

                return { status: 'idle' };
            }

            render() {
                const app = document.getElementById('app');
                const userStatus = this.getUserStatus();

                let html = '';

                if (!this.state.userTrigram) {
                    html += `
                        <div class="card">
                            <div class="trigram-input-section">
                                <label for="trigram-input">Enter your trigram:</label>
                                <input 
                                    type="text" 
                                    id="trigram-input" 
                                    placeholder="e.g., GRO" 
                                    maxlength="4"
                                    autocomplete="off"
                                />
                                <div style="margin-top: 12px;">
                                    <button class="btn btn-primary" onclick="app.setUserTrigram(document.getElementById('trigram-input').value)">
                                        Confirm
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const notifEnabled = localStorage.getItem('notificationsEnabled') === 'true';
                    html += `
                        <div class="notification-status ${notifEnabled ? 'enabled' : 'disabled'}">
                            <span>${notifEnabled ? '🔔' : '🔕'}</span>
                            <span>${notifEnabled ? 'Push notifications enabled' : 'Push notifications disabled'}</span>
                            <button class="btn btn-small" onclick="app.${notifEnabled ? 'disableNotifications' : 'enableNotifications'}()" style="margin-left: auto;">
                                ${notifEnabled ? 'Disable' : 'Enable'}
                            </button>
                        </div>
                    `;

                    if (userStatus.status === 'charging') {
                        html += `
                            <div class="alert alert-success">
                                <span style="font-size: 24px;">🔌</span>
                                <div>
                                    <strong>You are charging at ${userStatus.site}</strong>
                                    <div style="font-size: 14px; margin-top: 4px;">Don't forget to signal when you're done</div>
                                </div>
                            </div>
                        `;
                    } else if (userStatus.status === 'queued') {
                        const isNextInLine = userStatus.position === 1;
                        html += `
                            <div class="alert ${isNextInLine ? 'alert-warning' : 'alert-info'}">
                                <span style="font-size: 24px;">${isNextInLine ? '⏰' : '⏳'}</span>
                                <div>
                                    <strong>${isNextInLine ? 'You are next in line!' : `Position ${userStatus.position} in queue`}</strong>
                                    <div style="font-size: 14px; margin-top: 4px;">
                                        ${userStatus.preference === 'both' ? 'Waiting for any site' : `Waiting for ${userStatus.preference} only`}
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    html += `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                <div>
                                    <span style="color: #6b7280; font-size: 14px;">Logged in as</span>
                                    <div class="trigram-display" style="margin-top: 8px;">${this.state.userTrigram}</div>
                                </div>
                                <button class="btn btn-small" onclick="app.setUserTrigram('')" style="background: #9ca3af; color: white;">
                                    Change
                                </button>
                            </div>
                    `;

                    ['LLN1', 'LLN2'].forEach(site => {
                        const siteData = this.state.sites[site];
                        const available = MAX_SPOTS[site] - siteData.charging.length;
                        const isCharging = userStatus.status === 'charging' && userStatus.site === site;
                        const isQueued = userStatus.status === 'queued';
                        const isFull = available === 0;

                        html += `
                            <div class="site-section">
                                <h3>
                                    <span>📍</span>
                                    <span>${site}</span>
                                </h3>
                                <div class="station-info">
                                    <div class="station-status">
                                        <span class="status-dot ${available > 0 ? '' : 'busy'}"></span>
                                        <span>${available > 0 ? `${available} spot(s) available` : 'Full'}</span>
                                    </div>
                                    <span style="color: #6b7280; font-size: 14px;">${siteData.charging.length}/${MAX_SPOTS[site]}</span>
                                </div>
                                
                                <div class="action-buttons">
                                    ${!isCharging && userStatus.status !== 'charging' && !isQueued ? `
                                        <button class="btn btn-primary" onclick="app.startCharging('${site}')">
                                            🔌 I'm plugging in
                                        </button>
                                    ` : ''}
                                    
                                    ${isCharging ? `
                                        <button class="btn btn-danger" onclick="app.finishCharging('${site}')">
                                            ✅ I'm done charging
                                        </button>
                                    ` : ''}

                                    ${isFull && !isCharging && userStatus.status !== 'charging' ? `
                                        <button class="btn btn-small" onclick="app.reportSpotFree('${site}')" style="background: #f59e0b; color: white;">
                                            📢 Report spot free
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });

                    html += `
                        <div class="site-section">
                            <h3>
                                <span>👥</span>
                                <span>Waiting Queue</span>
                            </h3>
                    `;

                    if (this.state.globalQueue.length > 0) {
                        html += `
                            <div class="queue-section">
                                <h4>People waiting (${this.state.globalQueue.length})</h4>
                                <ul class="queue-list">
                                    ${this.state.globalQueue.map((item, index) => `
                                        <li class="queue-item ${item.trigram === this.state.userTrigram && index === 0 ? 'my-turn' : ''}">
                                            <div class="queue-position">
                                                <span class="position-number">${index + 1}</span>
                                                <span class="queue-trigram">
                                                    ${item.trigram}
                                                    ${item.preference !== 'both' ? `<span class="queue-site">(${item.preference} only)</span>` : ''}
                                                </span>
                                            </div>
                                            ${item.trigram === this.state.userTrigram && index === 0 ? `
                                                <button class="btn btn-small btn-danger" onclick="app.reportNoSpot()" style="margin-left: 8px;">
                                                    ⚠️ No spot available
                                                </button>
                                            ` : ''}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="empty-state">
                                <div class="empty-state-icon">✨</div>
                                <p>No one waiting</p>
                            </div>
                        `;
                    }

                    html += `</div>`;

                    if (userStatus.status === 'idle') {
                        html += `
                            <div class="site-preference">
                                <label>Join the waiting queue:</label>
                                <div class="radio-group">
                                    <div class="radio-option">
                                        <input type="radio" id="pref-both" name="site-pref" value="both" checked>
                                        <label for="pref-both">Any site</label>
                                    </div>
                                    <div class="radio-option">
                                        <input type="radio" id="pref-lln1" name="site-pref" value="LLN1">
                                        <label for="pref-lln1">LLN1 only</label>
                                    </div>
                                    <div class="radio-option">
                                        <input type="radio" id="pref-lln2" name="site-pref" value="LLN2">
                                        <label for="pref-lln2">LLN2 only</label>
                                    </div>
                                </div>
                                <div style="margin-top: 16px;">
                                    <button class="btn btn-secondary" onclick="app.joinQueueWithPreference()">
                                        ⏳ Join queue
                                    </button>
                                </div>
                            </div>
                        `;
                    } else if (userStatus.status === 'queued') {
                        html += `
                            <div style="margin-top: 16px;">
                                <button class="btn btn-danger" onclick="app.leaveQueue()">
                                    ❌ Leave queue
                                </button>
                            </div>
                        `;
                    }

                    html += `</div>`;
                }

                app.innerHTML = html;
            }

            joinQueueWithPreference() {
                const preference = document.querySelector('input[name="site-pref"]:checked').value;
                this.joinQueue(preference);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.app = new EVChargingApp();
        });
    </script>
</body>
</html>
